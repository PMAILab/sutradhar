# Render blueprint for Sutradhar's API only — the frontend is a separate
# Netlify site (see netlify.toml), which proxies /api/* to this service
# server-to-server rather than the browser calling it cross-origin. That
# proxy is what makes the session cookie first-party (Safari and an
# increasing share of Chrome block third-party cookies outright, which
# breaks a direct cross-origin setup even with correct CORS/SameSite
# config).
#
# Notes
# - Render injects PORT; the server reads process.env.PORT.
# - The browser never talks to Supabase directly (auth is fully server-side).
#   Fill every "sync: false" var in the dashboard.
# - APP_ORIGIN must be the Netlify site's https://<domain>, NOT this
#   service's own onrender.com URL — the browser navigates there directly
#   for the Google OAuth round trip (Netlify's proxy then forwards it here),
#   so that's the callback URL to allow-list in Supabase Dashboard → Auth →
#   URL Configuration → Redirect URLs: https://<netlify-domain>/api/auth/google/callback
# - FRONTEND_ORIGIN: same Netlify https://<domain> — only used as a CORS
#   allow-list fallback for anyone hitting this API directly instead of
#   through the Netlify proxy.
services:
  - type: web
    name: sutradhar-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
